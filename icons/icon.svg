<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Fond blanc arrondi -->
  <rect width="512" height="512" rx="80" fill="#F4F6F7"/>

  <!-- Couleur : teal logo #87BFCA -->

  <!-- ── Cercle (raquette outline) ── -->
  <circle cx="208" cy="258" r="186" fill="none" stroke="#87BFCA" stroke-width="15"/>

  <!-- ── Plume gauche (outer + nervure blanche) ── -->
  <polygon fill="#87BFCA" points="178,374 62,58 104,40 198,366"/>
  <polygon fill="#F4F6F7" points="183,372 71,64  97,46  194,368"/>

  <!-- ── Plume centrale ── -->
  <polygon fill="#87BFCA" points="194,364 178,38 220,32 230,362"/>
  <polygon fill="#F4F6F7" points="199,362 187,48 213,42 225,361"/>

  <!-- ── Plume droite ── -->
  <polygon fill="#87BFCA" points="222,366 270,44 310,62 246,376"/>
  <polygon fill="#F4F6F7" points="227,367 276,54 301,66 241,373"/>

  <!-- ── Liège — corps ── -->
  <rect fill="#87BFCA" x="174" y="378" width="74" height="34" rx="6"/>
  <!-- Séparateur horizontal -->
  <rect fill="#F4F6F7" x="174" y="390" width="74" height="7"/>
  <!-- Dôme -->
  <ellipse fill="#87BFCA" cx="211" cy="413" rx="37" ry="19"/>

  <!-- ── COACH vertical — lettres individuelles ── -->
  <text x="392" y="116"  font-family="'Arial Black','Franklin Gothic Heavy',Impact,sans-serif" font-size="76" font-weight="900" fill="#87BFCA" text-anchor="middle">C</text>
  <text x="392" y="193"  font-family="'Arial Black','Franklin Gothic Heavy',Impact,sans-serif" font-size="76" font-weight="900" fill="#87BFCA" text-anchor="middle">O</text>
  <text x="392" y="270"  font-family="'Arial Black','Franklin Gothic Heavy',Impact,sans-serif" font-size="76" font-weight="900" fill="#87BFCA" text-anchor="middle">A</text>
  <text x="392" y="347"  font-family="'Arial Black','Franklin Gothic Heavy',Impact,sans-serif" font-size="76" font-weight="900" fill="#87BFCA" text-anchor="middle">C</text>
  <text x="392" y="424"  font-family="'Arial Black','Franklin Gothic Heavy',Impact,sans-serif" font-size="76" font-weight="900" fill="#87BFCA" text-anchor="middle">H</text>

</svg>
