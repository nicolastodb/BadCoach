<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#0a1628"/>

  <!-- Decorative accent line -->
  <rect x="120" y="224" width="272" height="3" rx="1.5" fill="#00e676" opacity="0.4"/>

  <!-- BAD — blanc -->
  <text
    x="256" y="210"
    font-family="'Arial Black','Impact','Franklin Gothic Heavy',sans-serif"
    font-size="148" font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="14"
    textLength="400" lengthAdjust="spacingAndGlyphs"
  >BAD</text>

  <!-- COACH — vert -->
  <text
    x="256" y="368"
    font-family="'Arial Black','Impact','Franklin Gothic Heavy',sans-serif"
    font-size="148" font-weight="900"
    fill="#00e676"
    text-anchor="middle"
    letter-spacing="6"
    textLength="400" lengthAdjust="spacingAndGlyphs"
  >COACH</text>

  <!-- LIVE — petit, muted -->
  <text
    x="256" y="432"
    font-family="'Courier New', monospace"
    font-size="32" font-weight="400"
    fill="rgba(255,255,255,0.35)"
    text-anchor="middle"
    letter-spacing="10"
  >LIVE</text>
</svg>
