  <!-- Cordages -->
  <line x1="56"  y1="162" x2="384" y2="162" stroke="#00e676" stroke-width="7" opacity=".45"/>
  <line x1="54"  y1="210" x2="386" y2="210" stroke="#00e676" stroke-width="7" opacity=".45"/>
  <line x1="56"  y1="258" x2="384" y2="258" stroke="#00e676" stroke-width="7" opacity=".45"/>
  <line x1="148" y1="44"  x2="148" y2="376" stroke="#00e676" stroke-width="7" opacity=".45"/>
  <line x1="220" y1="42"  x2="220" y2="378" stroke="#00e676" stroke-width="7" opacity=".45"/>
  <line x1="292" y1="44"  x2="292" y2="376" stroke="#00e676" stroke-width="7" opacity=".45"/>

