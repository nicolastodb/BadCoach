// Court SVG constants (viewBox 300×540)
const C = {
  w:300, h:540, ml:22, mr:22, mt:18, mb:18,
  get cw(){return this.w-this.ml-this.mr},   // 256
  get ch(){return this.h-this.mt-this.mb},   // 504
  get netY(){return this.mt+this.ch/2},       // 270
  // SSL: 1.98m from net, half court 6.7m → 1.98/6.7 * ch/2
  get ssl(){return (1.98/6.7)*(this.ch/2)},  // ~74.7px
  // Singles width: 5.18/6.1 of total width
  get sw(){return this.cw*(5.18/6.1)},       // ~217px
  get so(){return (this.cw-this.sw)/2},      // ~19.5px
  get left(){return this.ml+this.so},
  get right(){return this.ml+this.so+this.sw},
  get top(){return this.mt},
  get bot(){return this.mt+this.ch},
};

// Convert normalized (0-1, 0=top/opponent back, 1=bottom/player back) to SVG px
function px(nx, ny){
  return {x: C.left + nx*C.sw, y: C.top + ny*C.ch};
}

     arrows:[{f:{x:.5,y:.68},t:{x:.5,y:.85},c:'#94a3b8',dash:true,lbl:'← Recule'},{f:{x:.5,y:.85},t:{x:.5,y:.65},c:'#f97316',dash:true,lbl:'Monte →'}],

let mode='singles', cat='service', sel=null;

function setMode(m){
  mode=m;
  sel=null;
  document.getElementById('modeS').className=m==='singles'?'active':'';
  document.getElementById('modeD').className=m==='doubles'?'active':'';
  render();
}

function setCat(c){
  cat=c;
  sel=null;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('cat-'+c).classList.add('active');
  render();
}

function selectT(id){
  sel=id;
  renderList();
  const t=findT(id);
  drawCourt(t);
  renderDetail(t);
}

function findT(id){
  const data=DB[mode];
  for(const arr of Object.values(data)){
    const t=arr.find(x=>x.id===id);
    if(t) return t;
  }
}

function render(){
  renderCats();
  renderList();
  drawCourt(null);
  renderDetail(null);
  document.getElementById('legend').innerHTML=`
    <div class="li"><div class="ld" style="background:#f97316"></div> Vous</div>
    <div class="li"><div class="ld" style="background:#3b82f6"></div> Adversaire</div>`;
}

function renderCats(){
  const el=document.getElementById('catList');
  el.innerHTML=CATS.map(c=>`
    <button class="cat-btn ${cat===c.id?'active':''}" id="cat-${c.id}" onclick="setCat('${c.id}')">
      <span class="ic">${c.icon}</span>${c.label}
    </button>`).join('');
}

function renderList(){
  const tactics=(DB[mode][cat])||[];
  const el=document.getElementById('tacticList');
  const lvl={D:'Débutant',I:'Intermédiaire',A:'Avancé'};
  const cls={D:'bd',I:'bi',A:'ba'};
  el.innerHTML=tactics.map(t=>`
    <div class="tc ${sel===t.id?'active':''}" onclick="selectT('${t.id}')">
      <div class="badge ${cls[t.level]}">${lvl[t.level]}</div>
      <h3>${t.title}</h3>
      <p>${t.desc}</p>
    </div>`).join('');
}

function renderDetail(t){
  const el=document.getElementById('detail');
  if(!t){
    el.innerHTML='<div class="empty"><div class="big">🏸</div>Sélectionnez une tactique pour voir les détails et la visualisation sur le terrain</div>';
    return;
  }
  const lvl={D:'Débutant',I:'Intermédiaire',A:'Avancé'};
  const cls={D:'bd',I:'bi',A:'ba'};
  el.innerHTML=`
    <div class="badge ${cls[t.level]}" style="margin-bottom:10px">${lvl[t.level]}</div>
    <h2>${t.title}</h2>
    <p class="detail-desc">${t.desc}</p>
    <div class="dsec">
      <h4>Conseils techniques</h4>
      ${t.tips.map(tip=>`<div class="tip"><div class="tipdot"></div><span>${tip}</span></div>`).join('')}
    </div>
    <div class="dsec">
      <h4>Quand utiliser</h4>
      <div class="box box-o">${t.when}</div>
    </div>
    <div class="dsec">
      <h4>Suite recommandée</h4>
      <div class="box box-b">${t.follow}</div>
    </div>`;
}

function drawCourt(t){
  const svg=document.getElementById('courtSvg');
  const {w,h,ml,mt,ch,cw,netY,ssl,sw,so,left,right,top,bot}=C;
  const cx=(left+right)/2;
  const sslTop=netY-ssl, sslBottom=netY+ssl;

  let s=`
    <rect width="${w}" height="${h}" fill="#0f1f3d"/>
    <rect x="${ml}" y="${top}" width="${cw}" height="${ch}" fill="#162a4a" rx="2"/>
    <rect x="${left}" y="${top}" width="${sw}" height="${ch}" fill="#1a3558"/>
    <!-- alley shade -->
    <rect x="${ml}" y="${top}" width="${so}" height="${ch}" fill="#0f1f3d" opacity=".5"/>
    <rect x="${right}" y="${top}" width="${so}" height="${ch}" fill="#0f1f3d" opacity=".5"/>
    <!-- back lines -->
    <rect x="${ml}" y="${top}" width="${cw}" height="${ch}" fill="none" stroke="#2a4a70" stroke-width="1.2"/>
    <!-- singles boundary -->
    <rect x="${left}" y="${top}" width="${sw}" height="${ch}" fill="none" stroke="#4a80c4" stroke-width="2"/>
    <!-- short service lines -->
    <line x1="${left}" y1="${sslTop}" x2="${right}" y2="${sslTop}" stroke="#4a80c4" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="${left}" y1="${sslBottom}" x2="${right}" y2="${sslBottom}" stroke="#4a80c4" stroke-width="1.5" stroke-dasharray="5,3"/>
    <!-- center lines (from SSL to back) -->
    <line x1="${cx}" y1="${top}" x2="${cx}" y2="${sslTop}" stroke="#3a6090" stroke-width="1" stroke-dasharray="3,4"/>
    <line x1="${cx}" y1="${sslBottom}" x2="${cx}" y2="${bot}" stroke="#3a6090" stroke-width="1" stroke-dasharray="3,4"/>
    <!-- net -->
    <line x1="${ml-2}" y1="${netY}" x2="${ml+cw+2}" y2="${netY}" stroke="#c0cfe0" stroke-width="1"/>
    <line x1="${left}" y1="${netY}" x2="${right}" y2="${netY}" stroke="#f0f6ff" stroke-width="3"/>
    <circle cx="${left}" cy="${netY}" r="3" fill="#c0cfe0"/>
    <circle cx="${right}" cy="${netY}" r="3" fill="#c0cfe0"/>
    <!-- labels -->
    <text x="${cx}" y="${top+14}" text-anchor="middle" fill="#334a66" font-size="9" font-family="sans-serif">ADVERSAIRE</text>
    <text x="${cx}" y="${bot-5}" text-anchor="middle" fill="#334a66" font-size="9" font-family="sans-serif">VOUS</text>
    <text x="${cx}" y="${netY-5}" text-anchor="middle" fill="#4a6a90" font-size="8" font-family="sans-serif">FILET</text>`;

  if(t){
    // arrows
    (t.arrows||[]).forEach((a,i)=>{
      if(a.zone){
        const p=px(a.f.x,a.f.y);
        s+=`<circle cx="${p.x}" cy="${p.y}" r="20" fill="${a.c}" opacity=".15"/>
            <circle cx="${p.x}" cy="${p.y}" r="20" fill="none" stroke="${a.c}" stroke-width="1.5" stroke-dasharray="4,3" opacity=".7"/>`;
        if(a.lbl) s+=`<text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="middle" fill="${a.c}" font-size="8" font-weight="bold">${a.lbl}</text>`;
        return;
      }
      const f=px(a.f.x,a.f.y), to=px(a.t.x,a.t.y);
      const dx=to.x-f.x, dy=to.y-f.y;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const ux=dx/len, uy=dy/len;
      const ex=to.x-ux*9, ey=to.y-uy*9;
      const dash=a.dash?'6,4':'none';
      const sw2=i===0?2.5:1.8;
      s+=`<line x1="${f.x}" y1="${f.y}" x2="${ex}" y2="${ey}" stroke="${a.c}" stroke-width="${sw2}" stroke-dasharray="${dash}" opacity=".9"/>
          <polygon points="${to.x},${to.y} ${to.x-uy*6-ux*9},${to.y+ux*6-uy*9} ${to.x+uy*6-ux*9},${to.y-ux*6-uy*9}" fill="${a.c}" opacity=".9"/>`;
      if(a.lbl){
        const mx=(f.x+to.x)/2, my=(f.y+to.y)/2;
        const ox=uy*11, oy=-ux*11;
        s+=`<text x="${mx+ox}" y="${my+oy}" text-anchor="middle" fill="${a.c}" font-size="8" font-family="sans-serif" font-weight="600">${a.lbl}</text>`;
      }
    });
    // players
    if(t.pos.p){const p=px(t.pos.p.x,t.pos.p.y);s+=`<circle cx="${p.x}" cy="${p.y}" r="11" fill="#f97316"/><text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="9" font-weight="bold">V</text>`;}
    if(t.pos.o){const p=px(t.pos.o.x,t.pos.o.y);s+=`<circle cx="${p.x}" cy="${p.y}" r="11" fill="#3b82f6"/><text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="9" font-weight="bold">A</text>`;}
  } else {
    // default
    const p=px(.5,.7);
    s+=`<circle cx="${p.x}" cy="${p.y}" r="11" fill="#f97316" opacity=".4"/>
        <text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="9" font-weight="bold">V</text>
        <text x="${cx}" y="${netY+55}" text-anchor="middle" fill="#334a66" font-size="10" font-family="sans-serif">← Choisissez une tactique</text>`;
  }

  svg.innerHTML=s;

  // legend
  const leg=document.getElementById('legend');
  const items=[`<div class="li"><div class="ld" style="background:#f97316"></div> Vous (V)</div>`,
               `<div class="li"><div class="ld" style="background:#3b82f6"></div> Adversaire (A)</div>`];
  if(t){
    const colors=[...new Set((t.arrows||[]).filter(a=>!a.zone).map(a=>a.c))];
    if(colors[0]) items.push(`<div class="li"><div class="ll" style="background:${colors[0]}"></div> Coup principal</div>`);
    if(colors[1]) items.push(`<div class="li"><div class="ll" style="background:${colors[1]};opacity:.8"></div> Coup 2</div>`);
    if((t.arrows||[]).some(a=>a.zone)) items.push(`<div class="li"><div class="ld" style="background:#22c55e;opacity:.6"></div> Zone idéale</div>`);
  }
  leg.innerHTML=items.join('');
}

// init
render();
</script>
