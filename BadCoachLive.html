<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>BadCoach — Tactiques Badminton</title>
<style>
:root{
  --bg:#09111f;--bg2:#0f1c32;--bg3:#060e1c;
  --card:#111f38;--border:#1a3050;--border2:#243d60;
  --text:#dce8f8;--muted:#4a6484;--dim:#243350;
  --accent:#f97316;--accent-lo:rgba(249,115,22,.12);
  --blue:#3b82f6;--green:#22c55e;--red:#ef4444;--purple:#a855f7;--gray:#94a3b8;
  --r:9px;--r2:6px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100dvh;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}

/* ── HEADER ── */
header{
  height:48px;display:flex;align-items:center;gap:10px;padding:0 16px;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;
}
.logo{font-size:1.2rem;font-weight:800;color:var(--accent);letter-spacing:-.5px}
.logo b{color:var(--text);font-weight:300}
.subtitle{color:var(--muted);font-size:.78rem}
.pills{margin-left:auto;display:flex;background:#080f1c;border-radius:20px;padding:3px;gap:2px}
.pill{padding:4px 14px;border:none;background:none;color:var(--muted);cursor:pointer;border-radius:16px;font-size:.78rem;font-weight:700;transition:all .2s;letter-spacing:.02em}
.pill.on{background:var(--accent);color:#fff}
.pill:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100dvh - 48px);overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:256px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--bg2);border-right:1px solid var(--border);overflow:hidden;
}
.cats{padding:8px;display:flex;flex-direction:column;gap:1px;border-bottom:1px solid var(--border)}
.cat{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  border:none;background:none;color:var(--muted);cursor:pointer;border-radius:var(--r2);
  font-size:.83rem;text-align:left;width:100%;transition:all .15s;
}
.cat:hover{background:var(--dim);color:var(--text)}
.cat.on{background:var(--accent-lo);color:var(--accent)}
.cat .ic{font-size:.95rem;width:18px;text-align:center;flex-shrink:0}
.tlist{flex:1;overflow-y:auto;padding:5px}
.tlist::-webkit-scrollbar{width:3px}
.tlist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.tc{
  padding:10px;border-radius:var(--r2);cursor:pointer;
  border:1px solid transparent;margin-bottom:3px;transition:all .15s;
}
.tc:hover{background:var(--dim)}
.tc.on{background:var(--accent-lo);border-color:rgba(249,115,22,.25)}
.tc h3{font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.3}
.tc p{font-size:.73rem;color:var(--muted);line-height:1.4}
.lv{display:inline-block;font-size:.64rem;font-weight:700;padding:2px 7px;border-radius:3px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.lD{background:rgba(34,197,94,.1);color:#22c55e}
.lI{background:rgba(249,115,22,.1);color:var(--accent)}
.lA{background:rgba(239,68,68,.1);color:#ef4444}

/* ── COURT AREA ── */
.court-area{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;padding:14px;background:var(--bg3);overflow:hidden;
}
.court-wrap{position:relative;width:100%;max-width:240px;flex-shrink:0}
.court-wrap svg{width:100%;border-radius:8px;display:block;touch-action:none}
.ctrl-wrap{display:flex;flex-direction:column;gap:6px;align-items:center;width:100%;max-width:280px}
.ctrl-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center}
.btn{
  padding:5px 12px;border:1px solid var(--border2);background:var(--card);
  color:var(--text);cursor:pointer;border-radius:20px;font-size:.73rem;font-weight:600;
  transition:all .15s;display:flex;align-items:center;gap:5px;line-height:1;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.atype{display:flex;gap:4px;align-items:center}
.at{
  width:24px;height:24px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .15s;
  display:flex;align-items:center;justify-content:center;
  font-size:.62rem;font-weight:700;color:#fff;
}
.at:hover,.at.on{border-color:#fff;transform:scale(1.1)}
.at.on{box-shadow:0 0 0 3px rgba(255,255,255,.15)}
.hint{font-size:.71rem;color:var(--muted);text-align:center;min-height:14px}
.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;font-size:.7rem;color:var(--muted)}
.li{display:flex;align-items:center;gap:4px}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ll{width:18px;height:2px;border-radius:1px;flex-shrink:0}

/* ── DETAIL ── */
.detail{
  width:284px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);
  overflow-y:auto;padding:18px 16px;
}
.detail::-webkit-scrollbar{width:3px}
.detail::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.detail h2{font-size:.98rem;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.3}
.ddesc{font-size:.8rem;color:var(--muted);line-height:1.6;margin-bottom:16px}
.dsec{margin-bottom:15px}
.dsec h4{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;font-weight:700}
.tip{display:flex;align-items:flex-start;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.78rem;color:#c8d8ea;line-height:1.5}
.tip:last-child{border-bottom:none}
.td{width:5px;height:5px;min-width:5px;border-radius:50%;background:var(--accent);margin-top:6px}
.box{border-radius:var(--r2);padding:10px;font-size:.78rem;color:#c0d4e8;line-height:1.55}
.bo{background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.18)}
.bb{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.18)}
.empty{text-align:center;padding:40px 12px;color:var(--muted);font-size:.84rem}
.empty-i{font-size:2.2rem;margin-bottom:10px}

/* ── MOBILE TABS ── */
.mob-tabs{display:none;height:49px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.mtab{flex:1;padding:0;border:none;background:none;color:var(--muted);font-size:.75rem;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-top:2px solid transparent;transition:all .15s}
.mtab.on{color:var(--accent);border-top-color:var(--accent)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{width:220px}
  .detail{width:240px}
}
@media(max-width:700px){
  html,body{height:100dvh;overflow:hidden}
  .layout{flex-direction:column;position:relative;overflow:visible}
  .sidebar,.detail{
    position:fixed;inset:48px 0 49px;z-index:50;
    width:100%;height:auto;border:none;display:none;overflow-y:auto;
  }
  .sidebar.show,.detail.show{display:flex}
  .court-area{flex:1;padding:10px;justify-content:center}
  .court-wrap{max-width:200px}
  .mob-tabs{display:flex}
  .subtitle{display:none}
}
</style>
</head>
<body>

<header>
  <span class="logo">Bad<b>Coach</b></span>
  <span class="subtitle">🏸 Tactiques Badminton</span>
  <div class="pills">
    <button class="pill on" id="mS" onclick="setMode('s')">Simple</button>
    <button class="pill" id="mD" onclick="setMode('d')">Double</button>
  </div>
</header>

<div class="layout" id="layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="cats" id="cats"></div>
    <div class="tlist" id="tlist"></div>
  </div>

  <!-- COURT -->
  <div class="court-area">
    <div class="court-wrap">
      <svg id="court" viewBox="0 0 300 540"
        aria-label="Terrain de badminton interactif" role="img"
        xmlns="http://www.w3.org/2000/svg">
      </svg>
    </div>
    <div class="ctrl-wrap">
      <div class="ctrl-row">
        <button class="btn on" id="bView" onclick="setEdit(false)">👁 Tactique</button>
        <button class="btn" id="bEdit" onclick="setEdit(true)">✏️ Éditer librement</button>
        <button class="btn" id="bReset" onclick="resetCourt()">↺</button>
      </div>
      <div class="ctrl-row" id="editCtrl" style="display:none">
        <span style="font-size:.7rem;color:var(--muted)">Flèche :</span>
        <div class="atype">
          <div class="at on" style="background:#ef4444" title="Smash" onclick="setAC(this,'#ef4444')">S</div>
          <div class="at" style="background:#3b82f6" title="Dégagé/Lift" onclick="setAC(this,'#3b82f6')">D</div>
          <div class="at" style="background:#f97316" title="Amorti" onclick="setAC(this,'#f97316')">A</div>
          <div class="at" style="background:#22c55e" title="Filet" onclick="setAC(this,'#22c55e')">F</div>
          <div class="at" style="background:#94a3b8" title="Déplacement" onclick="setAC(this,'#94a3b8')">M</div>
        </div>
        <button class="btn" onclick="clearArrows()">🗑</button>
      </div>
      <div class="hint" id="hint"></div>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <!-- DETAIL -->
  <div class="detail" id="detail">
    <div class="empty"><div class="empty-i">🏸</div>Choisissez une tactique dans la liste</div>
  </div>

</div>

<!-- Mobile bottom tabs -->
<div class="mob-tabs">
  <button class="mtab on" id="tabC" onclick="mobTab('court')"><span>🎾</span><span>Terrain</span></button>
  <button class="mtab" id="tabL" onclick="mobTab('list')"><span>📋</span><span>Tactiques</span></button>
  <button class="mtab" id="tabD" onclick="mobTab('detail')"><span>📖</span><span>Détail</span></button>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════
   COURT GEOMETRY  (viewBox 300 × 540)
   Court réel : 13.4 m × 6.1 m
   ═══════════════════════════════════════════ */
const G = Object.freeze({
  W:300, H:540,
  ML:22, MR:22, MT:22, MB:22,
  get CW(){return this.W-this.ML-this.MR},      // 256 px
  get CH(){return this.H-this.MT-this.MB},       // 496 px
  get NY(){return this.MT+this.CH/2},            // net Y = 270
  get SSL(){return (1.98/6.7)*(this.CH/2)},      // short service line offset ≈ 73.4 px
  get SW(){return this.CW*(5.18/6.1)},           // singles width ≈ 217.4 px
  get SO(){return (this.CW-this.SW)/2},          // singles offset ≈ 19.3 px
  get L(){return this.ML+this.SO},               // left singles line
  get R(){return this.ML+this.SO+this.SW},       // right singles line
  get T(){return this.MT},                       // top baseline
  get B(){return this.MT+this.CH},               // bottom baseline
  get CX(){return (this.L+this.R)/2},            // center X
});

/* normalized (0-1) → SVG px */
function px(nx,ny){return {x:G.L+nx*G.SW, y:G.T+ny*G.CH};}
/* SVG px → normalized */
function norm(sx,sy){return {x:(sx-G.L)/G.SW, y:(sy-G.T)/G.CH};}
function clamp(v,a=0,b=1){return Math.max(a,Math.min(b,v));}
function normC(sx,sy){return {x:clamp((sx-G.L)/G.SW,.02,.98), y:clamp((sy-G.T)/G.CH,.02,.98)};}

/* ═══════════════════════════════════════════
   TACTICS DATABASE
   pos.p = player (you, bottom), pos.o = opponent (top)
   arrows: f/t = normalized {x,y}, c = color, d = dashed, l = label, z = zone marker
   ═══════════════════════════════════════════ */
const DB = {
/* ─── SIMPLE ─── */
s:{
service:[
  {id:'sv1',level:'D',title:'Service court centré',
   desc:'Service rasant vers le T du carré de service adverse, juste au-dessus du filet.',
   pos:{p:{x:.5,y:.82},o:{x:.5,y:.1}},
   arrows:[{f:{x:.5,y:.8},t:{x:.5,y:.38},c:'#f97316',d:0,l:'Service'}],
   tips:['Rasez le filet — quelques cm suffisent.','Gardez le volant bas pour forcer un lift défensif.',
         'Même élan que le flick : restez imprévisible.'],
   when:'Ouverture standard. Impose votre jeu au filet dès le service.',
   follow:'Montez immédiatement au filet après la frappe.'},
  {id:'sv2',level:'D',title:'Service court croisé (revers)',
   desc:'Service court en diagonale vers le carré de service côté revers adverse.',
   pos:{p:{x:.42,y:.82},o:{x:.5,y:.1}},
   arrows:[{f:{x:.42,y:.8},t:{x:.73,y:.38},c:'#f97316',d:0,l:'Croisé ×'}],
   tips:['Le volant doit raser le filet en angle.','Force l\'adversaire à jouer du revers, moins naturel.',
         'Combinez : 2× droit → 1× croisé.'],
   when:'Quand vous avez identifié un revers faible ou pour varier.',
   follow:'Préparez un retour filet côté droit ou un lift long.'},
  {id:'sv3',level:'I',title:'Flick revers (long surprise)',
   desc:'Service tendu et rapide vers le fond côté revers — surprend l\'adversaire collé au filet.',
   pos:{p:{x:.5,y:.82},o:{x:.5,y:.1}},
   arrows:[{f:{x:.5,y:.8},t:{x:.82,y:.04},c:'#3b82f6',d:1,l:'Flick ×'}],
   tips:['Même préparation que le service court — déception maximale.','Le côté revers est le plus difficile à défendre.',
         'Max 1 sur 5 pour garder l\'effet de surprise.'],

   tips:['Même geste que le service court.','Le coup droit long adverse peut générer un dégagé puissant — soyez prêt.',

  {id:'sv5',level:'I',title:'Service long haut (dégagé de service)',

   tips:['En simple, le service long est la norme.','Visez les coins du fond pour réduire les angles.',

   when:'Ouverture classique en simple pour établir l\'échange de fond.',
   follow:'Restez au T, préparez un retour de fond ou un smash.'},
  {id:'sv6',level:'A',title:'Drive service (tendu-plat)',

   follow:'Choisissez le service selon la position et la réaction adverse.'},
],

attaque:[

   desc:'Smash puissant depuis le fond suivi d\'une montée rapide pour dominer l\'échange.',
   pos:{p:{x:.5,y:.9},o:{x:.35,y:.15}},
   arrows:[{f:{x:.5,y:.87},t:{x:.35,y:.3},c:'#ef4444',d:0,l:'Smash'},{f:{x:.5,y:.87},t:{x:.5,y:.65},c:'#f97316',d:1,l:'Monter'}],

   when:'Position de smash fond gauche, adversaire en défense en ligne.',

  {id:'at8',level:'I',title:'Rafale de smashes variés',

/* ═══════════════════════════════════════════
   SVG HELPERS
   ═══════════════════════════════════════════ */
const NS='http://www.w3.org/2000/svg';
const el=(tag,attrs,parent)=>{
  const e=document.createElementNS(NS,tag);
  for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if(parent) parent.appendChild(e);
  return e;
};

function drawArrow(svg,from,to,color,dashed,label){
  const f=px(from.x,from.y), t=px(to.x,to.y);
  const dx=t.x-f.x, dy=t.y-f.y, len=Math.hypot(dx,dy)||1;
  const ux=dx/len, uy=dy/len, hs=9;
  el('line',{x1:f.x,y1:f.y,x2:t.x-ux*hs,y2:t.y-uy*hs,
    stroke:color,'stroke-width':'2.2',
    'stroke-dasharray':dashed?'7,4':'none',opacity:.92},svg);
  el('polygon',{
    points:`${t.x},${t.y} ${t.x-uy*5-ux*hs},${t.y+ux*5-uy*hs} ${t.x+uy*5-ux*hs},${t.y-ux*5-uy*hs}`,
    fill:color,opacity:.92},svg);
  if(label){
    const mx=(f.x+t.x)/2, my=(f.y+t.y)/2;
    const e2=el('text',{x:mx+uy*12,y:my-ux*12,'text-anchor':'middle',
      fill:color,'font-size':'8','font-family':'sans-serif','font-weight':'600',opacity:.9},svg);
    e2.textContent=label;
  }
}

function drawZone(svg,pos,color,label){
  const p=px(pos.x,pos.y);
  el('circle',{cx:p.x,cy:p.y,r:22,fill:color,opacity:.1},svg);
  el('circle',{cx:p.x,cy:p.y,r:22,fill:'none',stroke:color,'stroke-width':'1.5',
    'stroke-dasharray':'4,3',opacity:.6},svg);
  if(label){
    const e=el('text',{x:p.x,y:p.y+1,'text-anchor':'middle','dominant-baseline':'middle',
      fill:color,'font-size':'9','font-family':'sans-serif','font-weight':'bold'},svg);
    e.textContent=label;
  }
}

function drawPlayer(svg,pos,color,letter){
  const p=px(pos.x,pos.y);
  el('circle',{cx:p.x+2,cy:p.y+2,r:12,fill:'rgba(0,0,0,.4)'},svg);
  el('circle',{cx:p.x,cy:p.y,r:12,fill:color},svg);
  const t=el('text',{x:p.x,y:p.y+1,'text-anchor':'middle','dominant-baseline':'middle',
    fill:'#fff','font-size':'10','font-weight':'700'},svg);
  t.textContent=letter;
}

function buildCourt(tactic){
  const svg=document.getElementById('court');
  while(svg.firstChild) svg.removeChild(svg.firstChild);

  const {W,H,ML,MT,MR,MB,CW,CH,NY,SSL,SW,SO,L,R,T,B,CX}=G;
  const sslT=NY-SSL, sslB=NY+SSL;
  const add=(tag,a)=>el(tag,a,svg);
  const line=(x1,y1,x2,y2,s,sw,d='none')=>add('line',{x1,y1,x2,y2,stroke:s,'stroke-width':sw,'stroke-dasharray':d});
  const rect=(x,y,w,h,f,rx=0,s='none',sw='0')=>{
    const r=add('rect',{x,y,width:w,height:h,fill:f,'stroke-width':sw});
    if(rx) r.setAttribute('rx',rx);
    if(s!=='none') r.setAttribute('stroke',s);
    return r;
  };
  const txt=(x,y,t,f,sz,a='middle')=>{const e=add('text',{x,y,'text-anchor':a,fill:f,'font-size':sz,'font-family':'sans-serif'});e.textContent=t;return e;};

  // Background layers
  rect(0,0,W,H,'#07101e');
  rect(ML,MT,CW,CH,'#111f38',2);
  rect(L,T,SW,CH,'#16284a',2);
  rect(ML,MT,SO,CH,'rgba(0,0,0,.4)');
  rect(R,MT,SO,CH,'rgba(0,0,0,.4)');

  // Court lines
  rect(ML,MT,CW,CH,'none',2,'#1e3050','1');
  rect(L,T,SW,CH,'none',0,'#3a6a9e','2');

  // Short service lines
  line(L,sslT,R,sslT,'#3a6a9e','1.5','5,3');
  line(L,sslB,R,sslB,'#3a6a9e','1.5','5,3');

  // Center lines (SSL to baseline only)
  line(CX,T,CX,sslT,'#2a4a72','1','4,4');
  line(CX,sslB,CX,B,'#2a4a72','1','4,4');

  // Net
  line(ML,NY,ML+CW,NY,'#4a6a8a','1');
  line(L,NY,R,NY,'#c8e0ff','3');
  add('circle',{cx:L,cy:NY,r:3,fill:'#8aa8cc'});
  add('circle',{cx:R,cy:NY,r:3,fill:'#8aa8cc'});

  // Labels
  txt(CX,T+13,'ADVERSAIRE','#243050','8.5');
  txt(CX,B-5,'VOUS','#243050','8.5');
  txt(CX,NY-6,'FILET','#304868','7.5');

  // Tactic content
  const useP=editMode?cP:(tactic?.pos?.p||{x:.5,y:.75});
  const useO=editMode?cO:(tactic?.pos?.o||{x:.5,y:.25});
  const arrows=editMode?cArrows:((tactic?.arrows)||[]);

  arrows.forEach(a=>{
    if(a.z) drawZone(svg,a.f,a.c,a.l);
    else drawArrow(svg,a.f,a.t,a.c,a.d,a.l);
  });

  drawPlayer(svg,useO,'#3b82f6','A');
  drawPlayer(svg,useP,'#f97316','V');

  // Draw preview dot
  if(editMode && drawStart){
    const p=px(drawStart.x,drawStart.y);
    add('circle',{cx:p.x,cy:p.y,r:6,fill:arrowColor,opacity:.8});
  }

  updateLegend(tactic);
}

function updateLegend(tactic){
  const el=document.getElementById('legend');
  const items=[
    `<div class="li"><div class="ld" style="background:#f97316"></div>Vous (V)</div>`,
    `<div class="li"><div class="ld" style="background:#3b82f6"></div>Adversaire (A)</div>`,
  ];
  if(!editMode && tactic){
    const colors=[...new Set((tactic.arrows||[]).filter(a=>!a.z).map(a=>a.c))];
    if(colors[0]) items.push(`<div class="li"><div class="ll" style="background:${colors[0]}"></div>Coup 1</div>`);
    if(colors[1]) items.push(`<div class="li"><div class="ll" style="background:${colors[1]}"></div>Coup 2</div>`);
    if(colors[2]) items.push(`<div class="li"><div class="ll" style="background:${colors[2]}"></div>Coup 3</div>`);
    if((tactic.arrows||[]).some(a=>a.z)) items.push(`<div class="li"><div class="ld" style="background:#22c55e;opacity:.5"></div>Zone</div>`);
  }
  if(editMode) items.push(`<div class="li" style="color:var(--accent);font-weight:600">✏️ Édition libre</div>`);
  el.innerHTML=items.join('');
}

/* ═══════════════════════════════════════════
   UI RENDER
   ═══════════════════════════════════════════ */
function renderCats(){
  document.getElementById('cats').innerHTML=CATS
    .filter(c=>!c.so||(mode==='s'))
    .map(c=>`<button class="cat ${cat===c.id?'on':''}" id="cat-${c.id}"
       onclick="setCat('${c.id}')" aria-pressed="${cat===c.id}">
       <span class="ic">${c.ic}</span>${c.label}</button>`).join('');
}

function renderList(){
  const lv={D:'Débutant',I:'Intermédiaire',A:'Avancé'};
  const t=getTactics();
  document.getElementById('tlist').innerHTML=t.length
    ? t.map(x=>`<div class="tc ${selId===x.id?'on':''}" onclick="selectT('${x.id}')"
        tabindex="0" role="button"
        onkeydown="if(event.key==='Enter')selectT('${x.id}')">
        <div class="lv l${x.level}">${lv[x.level]}</div>
        <h3>${x.title}</h3><p>${x.desc}</p></div>`).join('')
    : '<p style="padding:14px;color:var(--muted);font-size:.8rem">Aucune tactique pour ce mode.</p>';
}

function renderDetail(t){
  const d=document.getElementById('detail');
  if(!t){d.innerHTML='<div class="empty"><div class="empty-i">🏸</div>Choisissez une tactique dans la liste</div>';return;}
  const lv={D:'Débutant',I:'Intermédiaire',A:'Avancé'};
  d.innerHTML=`
    <div class="lv l${t.level}" style="margin-bottom:9px">${lv[t.level]}</div>
    <h2>${t.title}</h2>
    <p class="ddesc">${t.desc}</p>
    <div class="dsec"><h4>⚙️ Technique</h4>
      ${t.tips.map(tip=>`<div class="tip"><div class="td"></div><span>${tip}</span></div>`).join('')}
    </div>
    <div class="dsec"><h4>🎯 Quand utiliser</h4><div class="box bo">${t.when}</div></div>
    <div class="dsec"><h4>⏭ Suite recommandée</h4><div class="box bb">${t.follow}</div></div>`;
  d.scrollTop=0;
}

/* ═══════════════════════════════════════════
   INTERACTIVE COURT
   ═══════════════════════════════════════════ */
function getSVGPt(e){
  const svg=document.getElementById('court');
  const pt=svg.createSVGPoint();
  const src=e.touches?e.touches[0]:(e.changedTouches||[e])[0];
  pt.x=src.clientX; pt.y=src.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function onCourtDown(e){
  if(!editMode) return;
  if(e.touches) e.preventDefault();
  const c=getSVGPt(e);
  const pp=px(cP.x,cP.y), op=px(cO.x,cO.y);
  if(Math.hypot(c.x-pp.x,c.y-pp.y)<16){drag='p';return;}
  if(Math.hypot(c.x-op.x,c.y-op.y)<16){drag='o';return;}
  const n=normC(c.x,c.y);
  if(!drawStart){
    drawStart=n;
    document.getElementById('hint').textContent='Cliquez maintenant sur la destination de la flèche…';
  } else {
    const dx=n.x-drawStart.x, dy=n.y-drawStart.y;
    if(Math.hypot(dx,dy)>0.02)
      cArrows.push({f:{...drawStart},t:{...n},c:arrowColor,d:false,l:'',z:false,id:arrowSeq++});
    drawStart=null;
    document.getElementById('hint').textContent='Cliquez pour placer le départ d\'une flèche…';
  }
  buildCourt(findTactic(selId));
}

function onCourtMove(e){
  if(!drag||!editMode) return;
  if(e.touches) e.preventDefault();
  const c=getSVGPt(e);
  const n=normC(c.x,c.y);
  if(drag==='p') cP=n; else cO=n;
  buildCourt(findTactic(selId));
}

function onCourtUp(){drag=null;}

const court=document.getElementById('court');
court.addEventListener('mousedown',onCourtDown);
court.addEventListener('touchstart',onCourtDown,{passive:false});
document.addEventListener('mousemove',onCourtMove);
document.addEventListener('touchmove',onCourtMove,{passive:false});
document.addEventListener('mouseup',onCourtUp);
document.addEventListener('touchend',onCourtUp);

/* ═══════════════════════════════════════════
   STATE ACTIONS
   ═══════════════════════════════════════════ */
function setMode(m){
  mode=m; selId=null; cat='service';
  document.getElementById('mS').className='pill'+(m==='s'?' on':'');
  document.getElementById('mD').className='pill'+(m==='d'?' on':'');
  fullRender();
}

function setCat(c){
  cat=c; selId=null;
  document.querySelectorAll('.cat').forEach(b=>{b.classList.remove('on');b.setAttribute('aria-pressed','false');});
  const btn=document.getElementById('cat-'+c);
  if(btn){btn.classList.add('on');btn.setAttribute('aria-pressed','true');}
  renderList(); buildCourt(null); renderDetail(null);
}

function selectT(id){
  selId=id;
  const t=findTactic(id);
  if(!t) return;
  if(t.pos?.p) cP={...t.pos.p};
  if(t.pos?.o) cO={...t.pos.o};
  if(!editMode) cArrows=[];
  renderList(); buildCourt(t); renderDetail(t);
}

function setEdit(on){
  editMode=on;
  document.getElementById('bView').className='btn'+(on?'':' on');
  document.getElementById('bEdit').className='btn'+(on?' on':'');
  document.getElementById('editCtrl').style.display=on?'flex':'none';
  court.style.cursor=on?'crosshair':'default';
  const h=document.getElementById('hint');
  if(on){
    h.textContent='Cliquez pour placer le départ d\'une flèche…';
    const t=findTactic(selId);
    if(t) cArrows=(t.arrows||[]).filter(a=>!a.z).map((a,i)=>({...a,id:i}));
    arrowSeq=cArrows.length;
  } else {
    h.textContent=''; drawStart=null;
  }
  buildCourt(findTactic(selId));
}

function resetCourt(){
  drawStart=null; cArrows=[];
  if(selId){const t=findTactic(selId);if(t){if(t.pos?.p)cP={...t.pos.p};if(t.pos?.o)cO={...t.pos.o};}}
  else{cP={x:.5,y:.75};cO={x:.5,y:.25};}
  buildCourt(findTactic(selId));
}

function setAC(elem,c){
  arrowColor=c;
  document.querySelectorAll('.at').forEach(a=>a.classList.remove('on'));
  elem.classList.add('on');
}

function clearArrows(){cArrows=[];drawStart=null;buildCourt(findTactic(selId));}

/* Mobile tabs */
function mobTab(tab){
  ['tabC','tabL','tabD'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('sidebar').classList.remove('show');
  document.getElementById('detail').classList.remove('show');
  if(tab==='court') document.getElementById('tabC').classList.add('on');
  if(tab==='list'){document.getElementById('tabL').classList.add('on');document.getElementById('sidebar').classList.add('show');}
  if(tab==='detail'){document.getElementById('tabD').classList.add('on');document.getElementById('detail').classList.add('show');}
}

function fullRender(){
  renderCats(); renderList(); buildCourt(null); renderDetail(null);
}

fullRender();
</script>
</body>
</html>
